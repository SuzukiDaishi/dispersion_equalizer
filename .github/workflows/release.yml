name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
          - platform: linux-x64
            os: ubuntu-latest
          - platform: macos-universal
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libjack-jackd2-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev

      - name: Add macOS cross-compile target
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Run tests
        run: cargo test

      # ── macOS: arm64 bundle (native) ──────────────────────────────────────────

      - name: Bundle plugin
        run: cargo xtask bundle dispersion_equalizer --release

      # ── macOS: cross-compile x86_64 binary and merge into Universal ──────────

      - name: Cross-compile library for x86_64 (macOS)
        if: runner.os == 'macOS'
        run: cargo build --lib --release --target x86_64-apple-darwin

      - name: Create Universal macOS bundles
        if: runner.os == 'macOS'
        shell: bash
        run: |
          X64_LIB="target/x86_64-apple-darwin/release/libdispersion_equalizer.dylib"
          mkdir -p "target/universal"

          for PLUGIN_NAME in "Dispersion Equalizer.vst3" "Dispersion Equalizer.clap"; do
            ARM_BUNDLE="target/bundled/$PLUGIN_NAME"
            UNI_BUNDLE="target/universal/$PLUGIN_NAME"
            cp -R "$ARM_BUNDLE" "$UNI_BUNDLE"

            ARM_BIN=$(find "$ARM_BUNDLE/Contents/MacOS" -maxdepth 1 -type f | head -n1)
            if [ -z "$ARM_BIN" ]; then
              echo "::error::No binary found in $ARM_BUNDLE/Contents/MacOS"
              exit 1
            fi
            OUT_BIN="$UNI_BUNDLE/Contents/MacOS/$(basename "$ARM_BIN")"

            lipo -create "$ARM_BIN" "$X64_LIB" -output "$OUT_BIN"
            echo "$PLUGIN_NAME: $(lipo -archs "$OUT_BIN")"
          done

          cp -Rf "target/universal/Dispersion Equalizer.vst3" "target/bundled/"
          cp -Rf "target/universal/Dispersion Equalizer.clap" "target/bundled/"

      # ── macOS: import Developer ID certificate into a temporary keychain ──────

      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          MISSING=""
          [ -z "$APPLE_CERTIFICATE_P12" ]      && MISSING="$MISSING APPLE_CERTIFICATE_P12"
          [ -z "$APPLE_CERTIFICATE_PASSWORD" ] && MISSING="$MISSING APPLE_CERTIFICATE_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ── macOS: sign with Developer ID ────────────────────────────────────────

      - name: Sign macOS bundles
        if: runner.os == 'macOS'
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        shell: bash
        run: |
          if [ -z "$APPLE_IDENTITY" ]; then
            echo "::error::APPLE_IDENTITY secret is not set."
            echo "::error::Add 'Developer ID Application: Your Name (TEAMID)' as a repository secret."
            exit 1
          fi
          # Inside-out signing: binary first (with hardened runtime), then bundle
          sign_bundle() {
            local BUNDLE="$1"
            local BIN
            BIN=$(find "$BUNDLE/Contents/MacOS" -maxdepth 1 -type f | head -n1)
            if [ -z "$BIN" ]; then
              echo "::error::No binary found in $BUNDLE/Contents/MacOS"
              exit 1
            fi
            codesign --force --timestamp --options runtime \
              --sign "$APPLE_IDENTITY" "$BIN"
            codesign --force --timestamp \
              --sign "$APPLE_IDENTITY" "$BUNDLE"
          }
          sign_bundle "target/bundled/Dispersion Equalizer.vst3"
          sign_bundle "target/bundled/Dispersion Equalizer.clap"

      # ── macOS: package as DMG ─────────────────────────────────────────────────

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p target/dmg-contents target/package
          cp -R "target/bundled/Dispersion Equalizer.vst3" target/dmg-contents/
          cp -R "target/bundled/Dispersion Equalizer.clap" target/dmg-contents/
          hdiutil create \
            -volname "Dispersion Equalizer" \
            -srcfolder target/dmg-contents \
            -ov -format UDZO \
            "target/package/Dispersion.Equalizer-${TAG}-macos-universal.dmg"

      # ── macOS: notarize + staple ──────────────────────────────────────────────

      - name: Notarize and staple DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        shell: bash
        run: |
          MISSING=""
          [ -z "$APPLE_IDENTITY"    ] && MISSING="$MISSING APPLE_IDENTITY"
          [ -z "$APPLE_ID"          ] && MISSING="$MISSING APPLE_ID"
          [ -z "$APPLE_TEAM_ID"     ] && MISSING="$MISSING APPLE_TEAM_ID"
          [ -z "$APPLE_APP_PASSWORD"] && MISSING="$MISSING APPLE_APP_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          TAG="${{ github.ref_name }}"
          DMG="target/package/Dispersion.Equalizer-${TAG}-macos-universal.dmg"

          echo "Signing DMG..."
          codesign --force --timestamp --sign "$APPLE_IDENTITY" "$DMG"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id  "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json | tee target/package/notarization-result.json

          # Fetch detailed log using submission ID (useful when Apple rejects)
          SUB_ID=$(python3 -c "import sys,json; print(json.load(open('target/package/notarization-result.json'))['id'])" 2>/dev/null || true)
          if [ -n "$SUB_ID" ]; then
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --team-id  "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              target/package/notarization-log.json || true
          fi

          echo "Stapling ticket..."
          xcrun stapler staple   "$DMG"
          xcrun stapler validate "$DMG"
          echo "Notarization complete."

      - name: Clean up keychain (macOS)
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "$SIGNING_KEYCHAIN" ] && [ -f "$SIGNING_KEYCHAIN" ]; then
            security delete-keychain "$SIGNING_KEYCHAIN" || true
          fi

      - name: Upload notarization logs (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notarization-logs-${{ github.ref_name }}
          path: |
            target/package/notarization-result.json
            target/package/notarization-log.json
          if-no-files-found: ignore
          retention-days: 30

      # ── Windows / Linux: package as ZIP ──────────────────────────────────────

      - name: Create release zip (Windows / Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $bundleDir = Join-Path $PWD "target/bundled"
          $stage = Join-Path $PWD "target/package/${{ matrix.platform }}"
          $zipPath = Join-Path $PWD "target/package/Dispersion.Equalizer-$tag-${{ matrix.platform }}.zip"

          if (Test-Path $stage) { Remove-Item -LiteralPath $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          New-Item -ItemType Directory -Path (Split-Path $zipPath) -Force | Out-Null

          Copy-Item -LiteralPath (Join-Path $bundleDir "Dispersion Equalizer.vst3") -Destination (Join-Path $stage "Dispersion Equalizer.vst3") -Recurse -Force
          Copy-Item -LiteralPath (Join-Path $bundleDir "Dispersion Equalizer.clap") -Destination (Join-Path $stage "Dispersion Equalizer.clap") -Recurse -Force

          if (Test-Path $zipPath) { Remove-Item -LiteralPath $zipPath -Force }
          Compress-Archive -LiteralPath `
            (Join-Path $stage "Dispersion Equalizer.vst3"), `
            (Join-Path $stage "Dispersion Equalizer.clap") `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal

      # ── Upload artifacts ──────────────────────────────────────────────────────

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Dispersion.Equalizer-${{ github.ref_name }}-macos-universal
          path: target/package/Dispersion.Equalizer-${{ github.ref_name }}-macos-universal.dmg
          retention-days: 7
          if-no-files-found: error

      - name: Upload artifact (Windows / Linux)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Dispersion.Equalizer-${{ github.ref_name }}-${{ matrix.platform }}
          path: target/package/Dispersion.Equalizer-${{ github.ref_name }}-${{ matrix.platform }}.zip
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          FILES=(dist/*.zip dist/*.dmg)
          gh release create "$TAG" "${FILES[@]}" \
            --title "Dispersion Equalizer $TAG" \
            --generate-notes \
            --verify-tag
